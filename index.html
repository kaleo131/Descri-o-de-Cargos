<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Cargos e Salários - Cury</title>
    
    <link rel="icon" type="image/png" href="icone.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Saira:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Saira', 'sans-serif'],
                    },
                    colors: {
                        cury: {
                            dark: '#17379b',
                            blue: '#1749e3',
                            light: '#53ade6',
                            green: '#31c09d',
                            orange: '#e16944',
                            purple: '#9120bb',
                            bg: '#f4f4f4'
                        }
                    }
                }
            }
        }
    </script>
    
    <script defer src="/_vercel/insights/script.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        body { 
            background-color: #f4f4f4; 
            color: #1e293b; 
            background-image: linear-gradient(rgba(244, 244, 244, 0.88), rgba(244, 244, 244, 0.60)), url('fundo.png');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        @keyframes slideIn {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-animate { animation: slideIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="font-sans antialiased selection:bg-cury-light/30 selection:text-cury-dark flex flex-col min-h-screen relative">
    <div id="root" class="flex flex-col min-h-screen"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const getCargosUrl = () => 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTzT1zE75lovKmkVKdlfrcWed-9MLz_234UGBso8WeCNJwP3rvpGJUaFkLmysIDUAqwZvE5xmMPwV3f/pub?output=csv&single=true&gid=0';
        const getUsuariosUrl = () => 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTzT1zE75lovKmkVKdlfrcWed-9MLz_234UGBso8WeCNJwP3rvpGJUaFkLmysIDUAqwZvE5xmMPwV3f/pub?output=csv&single=true&gid=1546332252';
        const APPS_SCRIPT_WEBHOOK = 'https://script.google.com/macros/s/AKfycbwxVPi3LTwALm5yEu32rMhsHwVwbK31eFO1aXQ9GufJIkmai05WXSOqwALFAzQOjj2eZw/exec';

        const fetchWithTimeout = async (url, ms = 15000) => {
            const ctrl = new AbortController();
            const id = setTimeout(() => ctrl.abort(), ms);
            try {
                const r = await fetch(url, { signal: ctrl.signal });
                clearTimeout(id);
                if (r.ok) return await r.text();
                throw new Error("HTTP_ERR");
            } catch(e) {
                try {
                    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
                    const rProxy = await fetch(proxyUrl, { signal: ctrl.signal });
                    clearTimeout(id);
                    if (rProxy.ok) return await rProxy.text();
                    throw new Error("PROXY_ERR");
                } catch (proxyError) {
                    clearTimeout(id);
                    throw new Error("A rede impediu o download dos dados. Verifique sua conexão ou se a planilha está pública.");
                }
            }
        };

        const parseCSV = (text) => {
            const lines = text.split(/\r?\n/);
            if (lines.length < 2) return [];
            const delimiter = lines[0].includes(';') ? ';' : ',';
            const result = [];
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const regex = new RegExp(`(?:^|${delimiter})("(?:[^"]+|"")*"|[^${delimiter}]*)`, 'g');
                let values = [];
                let match;
                while ((match = regex.exec(lines[i])) !== null) {
                    if (match.index === regex.lastIndex) regex.lastIndex++; 
                    values.push(match[1].replace(/(^"|"$)/g, '').replace(/""/g, '"').trim());
                }
                result.push(values);
            }
            return result;
        };

        const MultiSelectDropdown = ({ options, selectedValues, onChange }) => {
            const [isOpen, setIsOpen] = useState(false);
            const ref = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (ref.current && !ref.current.contains(event.target)) setIsOpen(false);
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const toggleOption = (opt) => {
                const current = selectedValues ? selectedValues.split(',').map(s => s.trim()).filter(s => s) : [];
                const updated = current.includes(opt) ? current.filter(i => i !== opt) : [...current, opt];
                onChange(updated.join(', '));
            };

            const selectedList = selectedValues ? selectedValues.split(',').map(s => s.trim()).filter(s => s) : [];

            return (
                <div className="relative" ref={ref}>
                    <div onClick={() => setIsOpen(!isOpen)} className="w-full min-h-[38px] p-2 border border-slate-300 rounded-lg bg-slate-50 cursor-pointer flex flex-wrap gap-1 items-center justify-between">
                        <div className="flex flex-wrap gap-1 flex-1">
                            {selectedList.length === 0 && <span className="text-slate-400 text-sm">Selecione...</span>}
                            {selectedList.map(s => (
                                <span key={s} className="bg-cury-blue text-white px-2 py-0.5 rounded text-xs font-semibold flex items-center gap-1">
                                    {s}
                                </span>
                            ))}
                        </div>
                        <i className={`ph-bold ph-caret-${isOpen ? 'up' : 'down'} text-cury-blue text-sm ml-1`}></i>
                    </div>
                    {isOpen && (
                        <div className="absolute z-50 top-full left-0 mt-1 w-56 bg-white border border-slate-200 rounded-lg shadow-xl py-1">
                            {options.map(opt => (
                                <div key={opt} onClick={() => toggleOption(opt)} className="px-3 py-2 hover:bg-slate-50 cursor-pointer flex items-center gap-2 text-sm text-slate-700 font-medium">
                                    <div className={`w-4 h-4 rounded border flex items-center justify-center ${selectedList.includes(opt) ? 'bg-cury-blue border-cury-blue' : 'border-slate-300'}`}>
                                        {selectedList.includes(opt) && <i className="ph-bold ph-check text-white text-[10px]"></i>}
                                    </div>
                                    {opt}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const renderMark = (val) => {
            const v = val.toLowerCase().trim();
            if (v === 'x' || v === 'v' || v === 'sim') {
                return <div className="mx-auto w-6 h-6 bg-cury-light/20 text-cury-blue flex items-center justify-center rounded"><i className="ph-bold ph-check text-base"></i></div>;
            }
            if (v === '' || v === '-' || v === 'não' || v === 'nao') {
                return <span></span>;
            }
            return <span className="text-slate-700 text-xs font-bold px-2 py-1 bg-slate-100 rounded break-words block text-center leading-tight border border-slate-200">{val}</span>;
        };

        const SmartListOrMatrix = ({ text, titleCol, defaultText = "Não cadastrado", hasEvidence = false }) => {
            if (!text) return <p className="text-slate-500 italic text-sm">{defaultText}</p>;
            const lines = text.split('\n').filter(l => l.trim() !== '');
            const isMatrix = lines.some(l => l.includes('|'));

            if (!isMatrix) {
                return (
                    <ul className="list-disc pl-5 space-y-2 text-slate-600 text-sm marker:text-cury-light font-medium">
                        {lines.map((item, i) => <li key={i} className="pl-1">{item}</li>)}
                    </ul>
                );
            }

            return (
                <div className="overflow-x-auto rounded-xl border border-slate-200 shadow-sm mt-2 bg-white">
                    <table className="w-full text-sm text-left border-collapse min-w-full">
                        <thead className="bg-slate-50 text-cury-dark">
                            <tr>
                                <th className="p-3 border-b border-slate-200 font-bold">{titleCol}</th>
                                <th className="p-3 border-b border-slate-200 text-center w-20 font-extrabold border-l">JR</th>
                                <th className="p-3 border-b border-slate-200 text-center w-20 font-extrabold border-l">PL</th>
                                <th className="p-3 border-b border-slate-200 text-center w-20 font-extrabold border-l">SR</th>
                                {hasEvidence && <th className="p-3 border-b border-slate-200 font-bold border-l w-48">Evidência</th>}
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                            {lines.map((line, idx) => {
                                const parts = line.split('|').map(p => p.trim());
                                return (
                                    <tr key={idx} className="hover:bg-slate-50 transition-colors">
                                        <td className="p-3 text-slate-800 font-semibold">{parts[0]}</td>
                                        <td className="p-2 text-center align-middle border-l border-slate-100">{renderMark(parts[1] || '')}</td>
                                        <td className="p-2 text-center align-middle border-l border-slate-100">{renderMark(parts[2] || '')}</td>
                                        <td className="p-2 text-center align-middle border-l border-slate-100">{renderMark(parts[3] || '')}</td>
                                        {hasEvidence && (
                                            <td className="p-3 text-slate-600 text-xs border-l border-slate-100 font-medium">
                                                {parts[4] ? parts[4] : <span className="text-slate-300 italic">Não exigida</span>}
                                            </td>
                                        )}
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                </div>
            );
        };

        const normalizeString = (str) => str ? str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim() : '';

        const EditableMatrix = ({ text, onChange, titleCol, hasEvidence = false, evidenceOptions = [] }) => {
            const [rows, setRows] = useState([]);

            useEffect(() => {
                if (!text) { setRows([]); return; }
                const lines = text.split('\n').filter(l => l.trim() !== '');
                const parsed = lines.map(line => {
                    const p = line.split('|').map(x => x.trim());
                    
                    let evValue = p[4] || '';
                    if (hasEvidence && evValue) {
                        const existingEvs = evValue.split(',').map(s => normalizeString(s));
                        const matchedOptions = [];
                        evidenceOptions.forEach(opt => {
                            if (existingEvs.includes(normalizeString(opt))) matchedOptions.push(opt);
                        });
                        evValue = matchedOptions.join(', ');
                    }

                    return { item: p[0]||'', jr: p[1]||'', pl: p[2]||'', sr: p[3]||'', ev: evValue };
                });
                setRows(parsed);
            }, [text]);

            const notifyChange = (newRows) => {
                const str = newRows.map(r => `${r.item} | ${r.jr} | ${r.pl} | ${r.sr} ${hasEvidence ? '| '+r.ev : ''}`).join('\n');
                onChange(str);
            };

            const updateRow = (idx, field, val) => {
                const nr = [...rows];
                nr[idx][field] = val;
                setRows(nr);
                notifyChange(nr);
            };

            const addRow = () => {
                const nr = [...rows, { item: '', jr: '', pl: '', sr: '', ev: '' }];
                setRows(nr);
                notifyChange(nr);
            };

            const removeRow = (idx) => {
                const nr = rows.filter((_, i) => i !== idx);
                setRows(nr);
                notifyChange(nr);
            };

            const isChecked = (val) => {
                const v = val.toLowerCase().trim();
                return v === 'x' || v === 'v' || v === 'sim';
            };

            const handleCheck = (idx, field, currentVal) => {
                updateRow(idx, field, isChecked(currentVal) ? '' : 'X');
            };

            return (
                <div className="overflow-x-auto rounded-xl border border-cury-blue/30 shadow-sm mt-2 bg-white">
                    <table className="w-full text-sm text-left border-collapse min-w-full">
                        <thead className="bg-cury-blue/10 text-cury-dark">
                            <tr>
                                <th className="p-3 border-b border-cury-blue/20 font-bold">{titleCol}</th>
                                <th className="p-3 border-b border-cury-blue/20 text-center w-16 border-l border-cury-blue/20">JR</th>
                                <th className="p-3 border-b border-cury-blue/20 text-center w-16 border-l border-cury-blue/20">PL</th>
                                <th className="p-3 border-b border-cury-blue/20 text-center w-16 border-l border-cury-blue/20">SR</th>
                                {hasEvidence && <th className="p-3 border-b border-cury-blue/20 font-bold border-l border-cury-blue/20 w-56">Evidência</th>}
                                <th className="p-3 border-b border-cury-blue/20 text-center w-12 border-l border-cury-blue/20">Ação</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                            {rows.map((r, idx) => (
                                <tr key={idx}>
                                    <td className="p-2"><input type="text" value={r.item} onChange={(e) => updateRow(idx, 'item', e.target.value)} className="w-full p-2 border border-slate-300 rounded-lg bg-slate-50 focus:ring-2 focus:ring-cury-blue text-sm outline-none font-medium" placeholder="Descreva..." /></td>
                                    <td className="p-2 text-center border-l border-slate-100"><input type="checkbox" checked={isChecked(r.jr)} onChange={() => handleCheck(idx, 'jr', r.jr)} className="w-5 h-5 text-cury-blue rounded cursor-pointer" /></td>
                                    <td className="p-2 text-center border-l border-slate-100"><input type="checkbox" checked={isChecked(r.pl)} onChange={() => handleCheck(idx, 'pl', r.pl)} className="w-5 h-5 text-cury-blue rounded cursor-pointer" /></td>
                                    <td className="p-2 text-center border-l border-slate-100"><input type="checkbox" checked={isChecked(r.sr)} onChange={() => handleCheck(idx, 'sr', r.sr)} className="w-5 h-5 text-cury-blue rounded cursor-pointer" /></td>
                                    {hasEvidence && (
                                        <td className="p-2 border-l border-slate-100">
                                            <MultiSelectDropdown options={evidenceOptions} selectedValues={r.ev} onChange={(val) => updateRow(idx, 'ev', val)} />
                                        </td>
                                    )}
                                    <td className="p-2 text-center border-l border-slate-100"><button onClick={() => removeRow(idx)} className="text-cury-orange hover:bg-orange-50 p-1.5 rounded transition-colors"><i className="ph-bold ph-trash text-lg"></i></button></td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                    <div className="p-3 bg-slate-50 border-t border-slate-200 flex justify-center">
                        <button onClick={addRow} className="text-cury-blue font-bold text-sm hover:bg-cury-blue/10 px-4 py-2 rounded-lg flex items-center gap-2 transition-colors"><i className="ph-bold ph-plus"></i> Adicionar Linha</button>
                    </div>
                </div>
            );
        };

        const EditableFixedMatrix = ({ text, onChange, titleCol }) => {
            const [rows, setRows] = useState([]);

            useEffect(() => {
                if (!text) { setRows([]); return; }
                const lines = text.split('\n').filter(l => l.trim() !== '');
                setRows(lines.map(line => {
                    const p = line.split('|').map(x => x.trim());
                    return { item: p[0]||'', jr: p[1]||'', pl: p[2]||'', sr: p[3]||'' };
                }));
            }, [text]);

            const notifyChange = (newRows) => {
                onChange(newRows.map(r => `${r.item} | ${r.jr} | ${r.pl} | ${r.sr}`).join('\n'));
            };

            const updateRow = (idx, field, val) => {
                const nr = [...rows];
                nr[idx][field] = val;
                setRows(nr);
                notifyChange(nr);
            };

            return (
                <div className="overflow-x-auto rounded-xl border border-cury-blue/30 shadow-sm mt-2 bg-white">
                    <table className="w-full text-sm text-left border-collapse min-w-full">
                        <thead className="bg-cury-blue/10 text-cury-dark">
                            <tr>
                                <th className="p-3 border-b border-cury-blue/20 font-bold">{titleCol}</th>
                                <th className="p-3 border-b border-cury-blue/20 text-center w-32 border-l border-cury-blue/20">JR</th>
                                <th className="p-3 border-b border-cury-blue/20 text-center w-32 border-l border-cury-blue/20">PL</th>
                                <th className="p-3 border-b border-cury-blue/20 text-center w-32 border-l border-cury-blue/20">SR</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                            {rows.map((r, idx) => (
                                <tr key={idx}>
                                    <td className="p-3 font-bold text-cury-dark bg-slate-50">{r.item}</td>
                                    <td className="p-2 border-l border-slate-100"><input type="text" value={r.jr} onChange={(e) => updateRow(idx, 'jr', e.target.value)} className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-cury-blue text-xs text-center outline-none bg-slate-50 font-medium" /></td>
                                    <td className="p-2 border-l border-slate-100"><input type="text" value={r.pl} onChange={(e) => updateRow(idx, 'pl', e.target.value)} className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-cury-blue text-xs text-center outline-none bg-slate-50 font-medium" /></td>
                                    <td className="p-2 border-l border-slate-100"><input type="text" value={r.sr} onChange={(e) => updateRow(idx, 'sr', e.target.value)} className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-cury-blue text-xs text-center outline-none bg-slate-50 font-medium" /></td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        };

        function PortalApp() {
            const [cargos, setCargos] = useState([]);
            const [usuarios, setUsuarios] = useState([]);
            const [cargoSelecionado, setCargoSelecionado] = useState(null);
            
            const [loading, setLoading] = useState(true);
            const [erro, setErro] = useState(null);
            const [toast, setToast] = useState(null);
            
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [pastasAbertas, setPastasAbertas] = useState({});
            const [termoBusca, setTermoBusca] = useState('');

            const [isAuth, setIsAuth] = useState(false);
            const [loginEmail, setLoginEmail] = useState('');
            const [loginSenha, setLoginSenha] = useState('');

            const [isEditing, setIsEditing] = useState(false);
            const [editedCargo, setEditedCargo] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);

            const showToast = (msg, type = 'info') => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 4000);
            };

            const buscarDadosGlobais = async () => {
                setLoading(true);
                setErro(null);
                try {
                    const [csvUsuarios, csvCargos] = await Promise.all([
                        fetchWithTimeout(getUsuariosUrl(), 15000),
                        fetchWithTimeout(getCargosUrl(), 15000)
                    ]);

                    const parsedUsers = parseCSV(csvUsuarios);
                    const usersMap = parsedUsers.map(u => ({
                        nome: u[0] || '',
                        email: (u[1] || '').trim().toLowerCase(),
                        senha: (u[3] || '').trim(),
                        diretoria: u[4] || '',
                        departamento: u[5] || ''
                    })).filter(u => u.email);
                    setUsuarios(usersMap);

                    const parsedCargos = parseCSV(csvCargos);
                    const cargosMap = {};
                    
                    parsedCargos.forEach((val, index) => {
                        const titulo = val[2] || '';
                        if (!titulo) return;
                        const chave = `${val[0]}|${val[1]}|${titulo}`;

                        if (!cargosMap[chave]) {
                            cargosMap[chave] = {
                                id: index, area: val[0] || 'Geral', departamento: val[1] || 'Geral',
                                titulo: titulo, cbo: val[3] || '', codigo: val[4] || '',
                                hierarquia: val[5] || '', missao: val[6] || '',
                                escopo: '', compTecnicas: '', compComportamentais: '', experiencia: '', formacao: ''
                            };
                        } else {
                            if (val[0] && cargosMap[chave].area === 'Geral') cargosMap[chave].area = val[0];
                            if (val[1] && cargosMap[chave].departamento === 'Geral') cargosMap[chave].departamento = val[1];
                            if (val[3] && !cargosMap[chave].cbo) cargosMap[chave].cbo = val[3];
                            if (val[4] && !cargosMap[chave].codigo) cargosMap[chave].codigo = val[4];
                            if (val[5] && !cargosMap[chave].hierarquia) cargosMap[chave].hierarquia = val[5];
                            if (val[6] && !cargosMap[chave].missao) cargosMap[chave].missao = val[6];
                        }

                        const categoria = (val[7] || '').toLowerCase().trim();
                        const item = (val[8] || '').trim();
                        if (categoria && item) {
                            const linha = `${item} | ${val[9]||''} | ${val[10]||''} | ${val[11]||''} | ${val[12]||''}\n`;
                            if (categoria.includes('escopo') || categoria.includes('responsabilidade')) cargosMap[chave].escopo += linha;
                            else if (categoria.includes('técnica') || categoria.includes('tecnica')) cargosMap[chave].compTecnicas += linha;
                            else if (categoria.includes('comportamental') || categoria.includes('comportamento')) cargosMap[chave].compComportamentais += linha;
                            else if (categoria.includes('experiência') || categoria.includes('experiencia')) cargosMap[chave].experiencia += linha;
                            else if (categoria.includes('formação') || categoria.includes('formacao')) cargosMap[chave].formacao += linha;
                            else cargosMap[chave].escopo += linha;
                        }
                    });

                    const arrCargos = Object.values(cargosMap).sort((a, b) => a.titulo.localeCompare(b.titulo));
                    setCargos(arrCargos);

                    if (cargoSelecionado) {
                        const chaveSelect = `${cargoSelecionado.area}|${cargoSelecionado.departamento}|${cargoSelecionado.titulo}`;
                        const atualizado = arrCargos.find(c => `${c.area}|${c.departamento}|${c.titulo}` === chaveSelect);
                        if (atualizado) setCargoSelecionado(atualizado);
                    }
                } catch (error) {
                    setErro(error.message);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => { buscarDadosGlobais(); }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                const emailFormatado = loginEmail.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
                const u = usuarios.find(user => normalizeString(user.email) === emailFormatado && user.senha === loginSenha.trim());
                if (u) {
                    setIsAuth(u);
                    setLoginEmail(''); setLoginSenha('');
                    setPastasAbertas({ [u.diretoria]: true, [`${u.diretoria}|${u.departamento}`]: true });
                    showToast("Acesso liberado com sucesso!", "success");
                } else {
                    showToast("E-mail ou senha incorretos.", "error");
                }
            };

            const togglePasta = (idDaPasta) => setPastasAbertas(p => ({ ...p, [idDaPasta]: !p[idDaPasta] }));

            const cargosFiltradosGestor = cargos.filter(c => isAuth && c.area === isAuth.diretoria && c.departamento === isAuth.departamento);
            
            const arvoreDeCargos = {};
            cargosFiltradosGestor.forEach(cargo => {
                if (!arvoreDeCargos[cargo.area]) arvoreDeCargos[cargo.area] = {};
                if (!arvoreDeCargos[cargo.area][cargo.departamento]) arvoreDeCargos[cargo.area][cargo.departamento] = [];
                arvoreDeCargos[cargo.area][cargo.departamento].push(cargo);
            });

            const cargosFiltradosBusca = termoBusca ? cargosFiltradosGestor.filter(c => 
                c.titulo.toLowerCase().includes(termoBusca.toLowerCase())
            ) : [];

            const ativarEdicao = () => {
                setEditedCargo(JSON.parse(JSON.stringify(cargoSelecionado)));
                setIsEditing(true);
            };

            const cancelarEdicao = () => {
                setIsEditing(false);
                setEditedCargo(null);
            };

            const parseToObjList = (txt) => {
                if (!txt) return [];
                return txt.split('\n').filter(l => l.trim()).map(line => {
                    const p = line.split('|').map(s => s.trim());
                    return { item: p[0]||'', jr: p[1]||'', pl: p[2]||'', sr: p[3]||'', ev: p[4]||'' };
                });
            };

            const extrairLinhasParaPlanilha = (orig, novo, categoria) => {
                const lsOrig = parseToObjList(orig);
                const lsNovo = parseToObjList(novo);
                const result = [];
                const max = Math.max(lsOrig.length, lsNovo.length);
                for (let i=0; i<max; i++) {
                    const o = lsOrig[i] || {item:'', jr:'', pl:'', sr:'', ev:''};
                    const n = lsNovo[i] || {item:'', jr:'', pl:'', sr:'', ev:''};
                    if (!o.item && !n.item) continue;
                    result.push({
                        categoria: categoria,
                        descOrig: o.item, descNovo: n.item,
                        jrOrig: o.jr, jrNovo: n.jr,
                        plOrig: o.pl, plNovo: n.pl,
                        srOrig: o.sr, srNovo: n.sr,
                        evOrig: o.ev, evNovo: n.ev
                    });
                }
                return result;
            };

            const enviarRevisao = async () => {
                setIsSubmitting(true);
                const payload = {
                    gestor: isAuth,
                    cargoReferencia: {
                        titulo: cargoSelecionado.titulo, cbo: cargoSelecionado.cbo,
                        codigo: cargoSelecionado.codigo, hierarquia: cargoSelecionado.hierarquia,
                        missaoOrig: cargoSelecionado.missao, missaoNova: editedCargo.missao
                    },
                    linhas: [
                        ...extrairLinhasParaPlanilha(cargoSelecionado.escopo, editedCargo.escopo, 'Escopo'),
                        ...extrairLinhasParaPlanilha(cargoSelecionado.compTecnicas, editedCargo.compTecnicas, 'Técnica'),
                        ...extrairLinhasParaPlanilha(cargoSelecionado.compComportamentais, editedCargo.compComportamentais, 'Comportamental'),
                        ...extrairLinhasParaPlanilha(cargoSelecionado.experiencia, editedCargo.experiencia, 'Experiência'),
                        ...extrairLinhasParaPlanilha(cargoSelecionado.formacao, editedCargo.formacao, 'Formação')
                    ]
                };

                try {
                    await fetch(APPS_SCRIPT_WEBHOOK, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify(payload)
                    });
                    showToast("Proposta enviada com sucesso para o RH!", "success");
                    cancelarEdicao();
                } catch (e) {
                    showToast("Erro ao enviar revisão. Verifique sua conexão.", "error");
                } finally {
                    setIsSubmitting(false);
                }
            };

            return (
                <div className="flex flex-col min-h-screen">
                    
                    {toast && (
                        <div className={`fixed top-20 left-1/2 transform -translate-x-1/2 z-[100] px-6 py-4 rounded-lg shadow-2xl flex items-center gap-4 text-white font-medium toast-animate ${toast.type === 'error' ? 'bg-red-600' : 'bg-cury-green'}`}>
                            <i className={`ph-fill ${toast.type === 'error' ? 'ph-warning-circle' : 'ph-check-circle'} text-2xl`}></i> 
                            <span className="text-base">{toast.msg}</span>
                        </div>
                    )}

                    <div className={`fixed inset-0 bg-black/50 z-[60] transition-opacity duration-300 ${isSidebarOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`} onClick={() => setIsSidebarOpen(false)}></div>

                    <div className={`fixed top-0 left-0 h-full w-80 bg-white shadow-2xl z-[70] transform transition-transform duration-300 flex flex-col ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="bg-cury-dark p-6 text-white flex justify-between items-center">
                            <h2 className="font-bold text-lg flex items-center gap-2"><i className="ph-bold ph-list"></i> Menu de Acesso</h2>
                            <button onClick={() => setIsSidebarOpen(false)} className="hover:text-cury-orange transition-colors"><i className="ph-bold ph-x text-2xl"></i></button>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-4 bg-slate-50">
                            {!isAuth ? (
                                <form onSubmit={handleLogin} className="space-y-4 animate-fade-in mt-4">
                                    <p className="text-slate-600 text-sm mb-4">Insira sua credencial de gestor para acessar os descritivos da sua Diretoria.</p>
                                    <div>
                                        <label className="block text-sm font-bold text-cury-dark mb-1">E-mail Corporativo</label>
                                        <input type="email" value={loginEmail} onChange={e=>setLoginEmail(e.target.value)} className="w-full border border-slate-300 p-3 rounded-lg focus:ring-2 focus:ring-cury-blue outline-none text-sm" placeholder="seuemail@cury.net" required/>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-cury-dark mb-1">Senha de Acesso</label>
                                        <input type="password" value={loginSenha} onChange={e=>setLoginSenha(e.target.value)} className="w-full border border-slate-300 p-3 rounded-lg focus:ring-2 focus:ring-cury-blue outline-none text-sm" placeholder="••••••••" required/>
                                    </div>
                                    <button type="submit" className="w-full bg-cury-blue hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-colors mt-2 shadow-md">Desbloquear Ferramentas</button>
                                </form>
                            ) : (
                                <div className="animate-fade-in">
                                    <div className="mb-4 bg-white p-4 rounded-xl border border-slate-200 flex items-center gap-3 shadow-sm">
                                        <div className="bg-cury-blue text-white w-10 h-10 rounded-full flex items-center justify-center font-bold text-lg flex-shrink-0">{isAuth.nome.charAt(0)}</div>
                                        <div className="flex-1 overflow-hidden">
                                            <p className="font-bold text-sm text-cury-dark truncate">{isAuth.nome}</p>
                                            <p className="text-xs text-slate-500 truncate">{isAuth.departamento}</p>
                                        </div>
                                        <button onClick={() => { setIsAuth(false); setCargoSelecionado(null); }} className="text-slate-400 hover:text-cury-orange transition-colors"><i className="ph-bold ph-sign-out text-xl"></i></button>
                                    </div>

                                    <div className="w-full h-px bg-slate-200 my-4"></div>

                                    <div className="relative mb-4">
                                        <i className="ph-bold ph-magnifying-glass absolute left-3 top-3 text-slate-400"></i>
                                        <input type="text" placeholder="Buscar cargo..." value={termoBusca} onChange={e=>setTermoBusca(e.target.value)} className="w-full pl-9 pr-3 py-2.5 bg-white border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-cury-blue outline-none shadow-sm" />
                                    </div>

                                    {termoBusca ? (
                                        <div className="space-y-2">
                                            {cargosFiltradosBusca.map(c => (
                                                <button key={c.id} onClick={() => { setCargoSelecionado(c); setIsSidebarOpen(false); if(isEditing) cancelarEdicao(); }} className={`w-full text-left px-4 py-3 rounded-xl transition-colors border ${cargoSelecionado?.id === c.id ? 'bg-cury-blue/10 border-cury-blue text-cury-dark shadow-sm' : 'bg-white border-slate-200 hover:border-cury-light text-slate-700'}`}>
                                                    <p className="font-bold text-sm">{c.titulo}</p>
                                                </button>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="space-y-2">
                                            {Object.keys(arvoreDeCargos).map(area => (
                                                <div key={area} className="mb-2">
                                                    <button onClick={() => togglePasta(area)} className="w-full flex items-center gap-3 px-3 py-2.5 hover:bg-slate-100 rounded-lg text-left group transition-colors">
                                                        <i className={`ph-fill ${pastasAbertas[area] ? 'ph-folder-open' : 'ph-folder'} text-cury-light text-xl group-hover:text-cury-blue`}></i>
                                                        <span className="font-bold text-sm text-cury-dark flex-1 truncate">{area}</span>
                                                        <i className={`ph-bold ${pastasAbertas[area] ? 'ph-caret-down' : 'ph-caret-right'} text-slate-400`}></i>
                                                    </button>
                                                    {pastasAbertas[area] && (
                                                        <div className="ml-5 pl-3 border-l-2 border-slate-200 mt-1 space-y-1">
                                                            {Object.keys(arvoreDeCargos[area]).map(dept => {
                                                                const idDept = `${area}|${dept}`;
                                                                return (
                                                                    <div key={idDept}>
                                                                        <button onClick={() => togglePasta(idDept)} className="w-full flex items-center gap-2 px-3 py-2 hover:bg-slate-100 rounded-lg text-left group transition-colors">
                                                                            <i className={`ph-fill ${pastasAbertas[idDept] ? 'ph-folder-open' : 'ph-folder'} text-slate-400 group-hover:text-cury-blue text-lg`}></i>
                                                                            <span className="font-semibold text-sm text-slate-700 flex-1 truncate">{dept}</span>
                                                                            <i className={`ph-bold ${pastasAbertas[idDept] ? 'ph-caret-down' : 'ph-caret-right'} text-slate-300`}></i>
                                                                        </button>
                                                                        {pastasAbertas[idDept] && (
                                                                            <div className="ml-5 pl-3 border-l border-slate-200 mt-1 space-y-1 mb-3">
                                                                                {arvoreDeCargos[area][dept].map(c => (
                                                                                    <button key={c.id} onClick={() => { setCargoSelecionado(c); setIsSidebarOpen(false); if(isEditing) cancelarEdicao(); }} className={`w-full flex items-center gap-2 px-3 py-2 rounded-lg text-left transition-colors ${cargoSelecionado?.id === c.id ? 'bg-cury-blue text-white shadow-sm font-bold' : 'text-slate-600 hover:bg-slate-200 font-medium'}`}>
                                                                                        <i className={`ph-fill ph-briefcase text-base ${cargoSelecionado?.id === c.id ? 'text-white/70' : 'text-slate-400'}`}></i>
                                                                                        <span className="text-xs truncate">{c.titulo}</span>
                                                                                    </button>
                                                                                ))}
                                                                            </div>
                                                                        )}
                                                                    </div>
                                                                )
                                                            })}
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>

                    <header className="bg-cury-dark text-white border-b-4 border-cury-green sticky top-0 z-50 shadow-md">
                        <div className="max-w-6xl mx-auto px-6 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-4 w-full md:w-auto">
                                <button onClick={() => setIsSidebarOpen(true)} className="p-2 -ml-2 hover:bg-white/10 rounded-lg transition-colors flex items-center justify-center">
                                    <i className="ph-bold ph-list text-2xl"></i>
                                </button>
                                <div className="h-8 w-px bg-white/20 hidden md:block"></div>
                                <img src="logo.png" alt="Logo Cury" className="h-10 w-auto" onError={(e)=>{e.target.onerror = null; e.target.src="https://placehold.co/100x40/17379b/ffffff?text=CURY"}}/>
                                <div className="h-8 w-px bg-white/20 hidden md:block"></div>
                                <div>
                                    <h1 className="text-xl font-extrabold tracking-tight uppercase">Portal de Cargos</h1>
                                    <p className="text-xs text-cury-light font-medium hover:text-white transition-colors hover:underline">
                                        <a href="mailto:treinamento@cury.net">Remuneração & DHO</a>
                                    </p>
                                </div>
                            </div>
                            
                            <div className="flex gap-3 w-full md:w-auto justify-end">
                                {!isEditing ? (
                                    <button onClick={buscarDadosGlobais} className="text-sm font-bold bg-cury-blue py-2 px-5 rounded-full text-white flex items-center gap-2 border border-cury-light/30 shadow-inner hover:bg-blue-600 transition-colors">
                                        <i className={`ph-bold ph-arrows-clockwise text-lg ${loading ? 'animate-spin' : ''}`}></i>
                                        <span className="hidden sm:inline">Atualizar Dados</span>
                                    </button>
                                ) : (
                                    <div className="flex gap-2 animate-fade-in">
                                        <button onClick={cancelarEdicao} disabled={isSubmitting} className="py-2 px-4 rounded-full text-sm font-bold bg-white text-cury-orange hover:bg-slate-100 transition-colors shadow-sm">
                                            Cancelar
                                        </button>
                                        <button onClick={enviarRevisao} disabled={isSubmitting} className="py-2 px-5 rounded-full text-sm font-bold bg-cury-green text-white hover:bg-teal-500 transition-colors shadow-md flex items-center gap-2 border border-white/20">
                                            {isSubmitting ? <i className="ph-bold ph-spinner animate-spin text-lg"></i> : <i className="ph-bold ph-paper-plane-tilt text-lg"></i>}
                                            <span className="hidden sm:inline">{isSubmitting ? 'Enviando...' : 'Enviar para RH'}</span>
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>

                    <main className="flex-grow w-full max-w-6xl mx-auto p-4 md:p-8 flex flex-col h-full">
                        {loading && cargos.length === 0 ? (
                            <div className="flex-1 flex flex-col items-center justify-center">
                                <i className="ph-bold ph-spinner text-5xl text-cury-blue animate-spin mb-4"></i>
                                <h2 className="text-xl font-bold text-cury-dark">Conectando aos Servidores...</h2>
                            </div>
                        ) : erro ? (
                            <div className="flex-1 flex flex-col items-center justify-center p-8 text-center">
                                <div className="bg-red-50 p-6 rounded-2xl max-w-lg border border-red-200 shadow-sm">
                                    <i className="ph-fill ph-warning-circle text-5xl text-red-500 mx-auto mb-4"></i>
                                    <h2 className="text-xl font-bold text-red-900 mb-2">Erro de Conexão</h2>
                                    <p className="text-slate-700 text-sm font-medium">{erro}</p>
                                </div>
                            </div>
                        ) : !isAuth ? (
                            <div className="flex flex-col items-center justify-center h-full text-center flex-1">
                                <div className="bg-white p-8 rounded-full mb-6 shadow-md border border-slate-200 relative">
                                    <i className="ph-fill ph-shield-check text-6xl text-cury-blue relative z-10"></i>
                                    <div className="absolute inset-0 bg-cury-light/20 rounded-full animate-ping opacity-50"></div>
                                </div>
                                <h3 className="text-3xl font-extrabold text-cury-dark mb-4 tracking-tight">Área do Gestor</h3>
                                <p className="text-slate-600 max-w-lg text-lg leading-relaxed font-medium bg-white/60 p-5 rounded-xl border border-slate-200 shadow-sm">
                                    Abra o Menu Lateral e faça login com as suas credenciais corporativas para acessar, analisar e solicitar revisão dos descritivos da sua Diretoria.
                                </p>
                                <button onClick={() => setIsSidebarOpen(true)} className="mt-8 bg-cury-orange text-white font-bold py-3 px-8 rounded-full shadow-lg hover:bg-orange-600 transition transform hover:scale-105 flex items-center gap-2">
                                    <i className="ph-bold ph-sign-in text-xl"></i> Fazer Login
                                </button>
                            </div>
                        ) : cargoSelecionado ? (
                            <div className="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden flex flex-col relative pb-8 w-full">
                                
                                {isEditing && (
                                    <div className="bg-cury-orange text-white text-center py-2 text-xs font-bold tracking-widest uppercase flex items-center justify-center gap-2 shadow-inner">
                                        <i className="ph-bold ph-pencil-simple text-base"></i> Modo de Edição e Revisão Ativo
                                    </div>
                                )}

                                <div className={`p-8 md:p-12 border-b border-slate-200 relative overflow-hidden flex flex-col justify-end transition-colors duration-500 min-h-[220px] ${isEditing ? 'bg-slate-800' : 'bg-cury-dark'} text-white`}>
                                    <div className="absolute top-0 right-0 opacity-[0.05] pointer-events-none transform translate-x-1/4 -translate-y-1/4">
                                        <i className="ph-fill ph-briefcase text-[350px]"></i>
                                    </div>
                                    <div className="relative z-10 w-full flex flex-col md:flex-row md:items-end justify-between gap-6">
                                        <div className="flex-1">
                                            <div className="flex flex-wrap items-center gap-2 text-xs font-bold text-cury-light mb-4 uppercase tracking-wider bg-black/30 w-max px-4 py-2 rounded-full backdrop-blur-md border border-white/10 shadow-sm">
                                                <span>{cargoSelecionado.area}</span>
                                                <i className="ph-bold ph-caret-right text-[10px]"></i>
                                                <span className="text-white">{cargoSelecionado.departamento}</span>
                                            </div>
                                            <h2 className="text-3xl md:text-5xl font-black mb-4 leading-tight tracking-tight">{cargoSelecionado.titulo}</h2>
                                            
                                            <div className="flex flex-wrap gap-3">
                                                {cargoSelecionado.cbo && <span className="bg-white/10 border border-white/20 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1 shadow-sm"><span className="text-cury-light">CBO:</span> {cargoSelecionado.cbo}</span>}
                                                {cargoSelecionado.codigo && <span className="bg-white/10 border border-white/20 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1 shadow-sm"><span className="text-cury-light">CÓD:</span> {cargoSelecionado.codigo}</span>}
                                            </div>
                                        </div>
                                        {!isEditing && (
                                            <button onClick={ativarEdicao} className="relative z-10 bg-cury-green text-white hover:bg-teal-500 px-6 py-3.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 shadow-lg transition-transform transform hover:-translate-y-1 border border-white/20">
                                                <i className="ph-bold ph-pencil-simple-line text-xl"></i> Propor Alterações
                                            </button>
                                        )}
                                    </div>
                                </div>
                                
                                <div className="p-8 md:p-12 space-y-12">
                                    <section>
                                        <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                                            <i className="ph-fill ph-tree-structure text-lg"></i> Estrutura Hierárquica
                                        </h3>
                                        <p className="text-cury-dark font-bold bg-slate-50 px-5 py-4 rounded-xl border border-slate-200 text-sm shadow-sm">
                                            {cargoSelecionado.hierarquia || "Estrutura não detalhada."}
                                        </p>
                                    </section>

                                    <section>
                                        <h3 className="text-xl font-extrabold text-cury-dark border-b-2 border-cury-blue/20 pb-2 mb-5 flex items-center gap-2">
                                            <div className="p-1.5 bg-cury-blue/10 rounded-lg text-cury-blue"><i className="ph-bold ph-target"></i></div>
                                            Missão do Cargo
                                        </h3>
                                        {isEditing ? (
                                            <textarea value={editedCargo.missao} onChange={(e) => setEditedCargo({...editedCargo, missao: e.target.value})} className="w-full border-2 border-cury-orange/50 rounded-xl p-5 focus:ring-4 focus:ring-cury-orange/20 outline-none text-slate-800 font-medium bg-orange-50/30 shadow-inner" rows={3} />
                                        ) : (
                                            <p className="text-slate-600 leading-relaxed font-medium bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                                                {cargoSelecionado.missao || "Missão não cadastrada."}
                                            </p>
                                        )}
                                    </section>

                                    <section>
                                        <h3 className="text-xl font-extrabold text-cury-dark border-b-2 border-cury-blue/20 pb-2 mb-5 flex items-center gap-2">
                                            <div className="p-1.5 bg-cury-green/10 rounded-lg text-cury-green"><i className="ph-bold ph-list-checks"></i></div>
                                            Escopo / Responsabilidades
                                        </h3>
                                        {isEditing ? (
                                            <EditableMatrix text={editedCargo.escopo} titleCol="Responsabilidade" onChange={(val) => setEditedCargo({...editedCargo, escopo: val})} />
                                        ) : (
                                            <SmartListOrMatrix text={cargoSelecionado.escopo} titleCol="Atividade / Responsabilidade" />
                                        )}
                                    </section>

                                    <div className="space-y-12">
                                        <section>
                                            <h3 className="text-xl font-extrabold text-cury-dark border-b-2 border-cury-blue/20 pb-2 mb-5 flex items-center gap-2">
                                                <div className="p-1.5 bg-cury-orange/10 rounded-lg text-cury-orange"><i className="ph-bold ph-wrench"></i></div>
                                                Competências Técnicas
                                            </h3>
                                            {isEditing ? (
                                                <EditableMatrix text={editedCargo.compTecnicas} titleCol="Item" hasEvidence={true} evidenceOptions={['Certificado', 'Experiência', 'Teste', 'Entrevista']} onChange={(val) => setEditedCargo({...editedCargo, compTecnicas: val})} />
                                            ) : (
                                                <SmartListOrMatrix text={cargoSelecionado.compTecnicas} titleCol="Competência" hasEvidence={true} />
                                            )}
                                        </section>

                                        <section>
                                            <h3 className="text-xl font-extrabold text-cury-dark border-b-2 border-cury-blue/20 pb-2 mb-5 flex items-center gap-2">
                                                <div className="p-1.5 bg-cury-purple/10 rounded-lg text-cury-purple"><i className="ph-bold ph-users"></i></div>
                                                Competências Comportamentais
                                            </h3>
                                            {isEditing ? (
                                                <EditableMatrix text={editedCargo.compComportamentais} titleCol="Comportamento" hasEvidence={true} evidenceOptions={['Experiência', 'Teste Comportamental', 'Entrevista']} onChange={(val) => setEditedCargo({...editedCargo, compComportamentais: val})} />
                                            ) : (
                                                <SmartListOrMatrix text={cargoSelecionado.compComportamentais} titleCol="Comportamento" hasEvidence={true} />
                                            )}
                                        </section>

                                        <section>
                                            <h3 className="text-xl font-extrabold text-cury-dark border-b-2 border-cury-blue/20 pb-2 mb-5 flex items-center gap-2">
                                                <div className="p-1.5 bg-cury-light/10 rounded-lg text-cury-light"><i className="ph-bold ph-graduation-cap"></i></div>
                                                Formação Acadêmica
                                            </h3>
                                            {isEditing ? (
                                                <EditableFixedMatrix text={editedCargo.formacao} titleCol="Exigência" onChange={(val) => setEditedCargo({...editedCargo, formacao: val})} />
                                            ) : (
                                                <SmartListOrMatrix text={cargoSelecionado.formacao} titleCol="Exigência" />
                                            )}
                                        </section>

                                        <section>
                                            <h3 className="text-xl font-extrabold text-cury-dark border-b-2 border-cury-blue/20 pb-2 mb-5 flex items-center gap-2">
                                                <div className="p-1.5 bg-slate-200/50 rounded-lg text-slate-600"><i className="ph-bold ph-briefcase"></i></div>
                                                Experiência Profissional
                                            </h3>
                                            {isEditing ? (
                                                <EditableFixedMatrix text={editedCargo.experiencia} titleCol="Critério" onChange={(val) => setEditedCargo({...editedCargo, experiencia: val})} />
                                            ) : (
                                                <SmartListOrMatrix text={cargoSelecionado.experiencia} titleCol="Critério" />
                                            )}
                                        </section>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="flex flex-col items-center justify-center h-full text-center flex-1">
                                <div className="bg-white p-8 rounded-full mb-6 shadow-md border border-slate-200">
                                    <i className="ph-fill ph-map-trifold text-6xl text-cury-light"></i>
                                </div>
                                <h3 className="text-3xl font-extrabold text-cury-dark mb-4 tracking-tight">Trilhas de Carreira</h3>
                                <p className="text-slate-600 max-w-lg text-lg leading-relaxed font-medium bg-white/60 p-5 rounded-xl border border-slate-200 shadow-sm">
                                    Selecione um cargo no menu lateral para visualizar a matriz completa de responsabilidades e requisitos para Júnior, Pleno e Sênior em uma única tela.
                                </p>
                            </div>
                        )}
                    </main>
                    
                    <footer className="bg-cury-dark text-white p-8 w-full border-t-4 border-cury-blue mt-auto">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-8">
                            <div className="space-y-3 w-full md:w-auto text-center md:text-left">
                                <h4 class="font-extrabold text-xl">Dúvidas sobre os processos?</h4>
                                <p class="text-cury-light text-sm font-medium">Fale com a gente: <strong><a href="mailto:treinamento@cury.net" class="hover:underline text-white">treinamento@cury.net</a></strong></p>
                            </div>
                            
                            <div className="text-center md:text-right w-full md:w-auto border-t border-white/20 md:border-t-0 pt-4 md:pt-0">
                                <p className="font-bold text-base">Cargos e Salários / Remuneração & DHO</p>
                                <p className="mt-1 text-cury-light text-xs font-medium">Uso restrito e interno Cury Construtora</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PortalApp />);
    </script>
</body>
</html>
