<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Cargos e Salários - Cury</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/_vercel/insights/script.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        @keyframes slideIn {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-animate { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const getCargosUrl = () => 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTzT1zE75lovKmkVKdlfrcWed-9MLz_234UGBso8WeCNJwP3rvpGJUaFkLmysIDUAqwZvE5xmMPwV3f/pub?output=csv&single=true&gid=0';
        const getUsuariosUrl = () => 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTzT1zE75lovKmkVKdlfrcWed-9MLz_234UGBso8WeCNJwP3rvpGJUaFkLmysIDUAqwZvE5xmMPwV3f/pub?output=csv&single=true&gid=1546332252';
        const APPS_SCRIPT_WEBHOOK = 'https://script.google.com/macros/s/AKfycbwrNAcNyArmP_4SUDkR01OqVtdfwcgkwSuTIDTXtzwC6NuxHeWM8brajmKn6yR0U3IhRA/exec';

        const fetchWithTimeout = async (url, ms = 15000) => {
            const ctrl = new AbortController();
            const id = setTimeout(() => ctrl.abort(), ms);
            
            try {
                const r = await fetch(url, { signal: ctrl.signal });
                clearTimeout(id);
                if (r.ok) return await r.text();
                throw new Error("HTTP_ERR");
            } catch(e) {
                try {
                    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
                    const rProxy = await fetch(proxyUrl, { signal: ctrl.signal });
                    clearTimeout(id);
                    if (rProxy.ok) return await rProxy.text();
                    throw new Error("PROXY_ERR");
                } catch (proxyError) {
                    clearTimeout(id);
                    throw new Error("Verifique se a planilha está pública (Qualquer pessoa com o link) e tente novamente.");
                }
            }
        };

        const parseCSV = (text) => {
            const lines = text.split(/\r?\n/);
            if (lines.length < 2) return [];
            const delimiter = lines[0].includes(';') ? ';' : ',';
            const result = [];
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const regex = new RegExp(`(?:^|${delimiter})("(?:[^"]+|"")*"|[^${delimiter}]*)`, 'g');
                let values = [];
                let match;
                while ((match = regex.exec(lines[i])) !== null) {
                    if (match.index === regex.lastIndex) regex.lastIndex++; 
                    values.push(match[1].replace(/(^"|"$)/g, '').replace(/""/g, '"').trim());
                }
                result.push(values);
            }
            return result;
        };

        const MultiSelectDropdown = ({ options, selectedValues, onChange }) => {
            const [isOpen, setIsOpen] = useState(false);
            const ref = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (ref.current && !ref.current.contains(event.target)) setIsOpen(false);
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const toggleOption = (opt) => {
                const current = selectedValues ? selectedValues.split(',').map(s => s.trim()).filter(s => s) : [];
                const updated = current.includes(opt) ? current.filter(i => i !== opt) : [...current, opt];
                onChange(updated.join(', '));
            };

            const selectedList = selectedValues ? selectedValues.split(',').map(s => s.trim()).filter(s => s) : [];

            return (
                <div className="relative" ref={ref}>
                    <div onClick={() => setIsOpen(!isOpen)} className="w-full min-h-[38px] p-2 border border-blue-300 rounded bg-blue-50/50 cursor-pointer flex flex-wrap gap-1 items-center justify-between">
                        <div className="flex flex-wrap gap-1 flex-1">
                            {selectedList.length === 0 && <span className="text-gray-400 text-xs">Selecione...</span>}
                            {selectedList.map(s => (
                                <span key={s} className="bg-blue-600 text-white px-2 py-0.5 rounded-full text-[10px] font-medium flex items-center gap-1">
                                    {s}
                                </span>
                            ))}
                        </div>
                        <i className={`ph-bold ph-caret-${isOpen ? 'up' : 'down'} text-blue-600 text-xs ml-1`}></i>
                    </div>
                    {isOpen && (
                        <div className="absolute z-50 top-full left-0 mt-1 w-48 bg-white border border-gray-200 rounded-lg shadow-xl py-1">
                            {options.map(opt => (
                                <div key={opt} onClick={() => toggleOption(opt)} className="px-3 py-2 hover:bg-blue-50 cursor-pointer flex items-center gap-2 text-sm text-gray-700">
                                    <div className={`w-4 h-4 rounded border flex items-center justify-center ${selectedList.includes(opt) ? 'bg-blue-600 border-blue-600' : 'border-gray-300'}`}>
                                        {selectedList.includes(opt) && <i className="ph-bold ph-check text-white text-[10px]"></i>}
                                    </div>
                                    {opt}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const renderMark = (val) => {
            const v = val.toLowerCase().trim();
            if (v === 'x' || v === 'v' || v === 'sim') {
                return <div className="mx-auto w-6 h-6 bg-blue-100 text-blue-700 flex items-center justify-center rounded-md"><i className="ph-bold ph-check text-base"></i></div>;
            }
            if (v === '' || v === '-' || v === 'não' || v === 'nao') {
                return <i className="ph-bold ph-minus text-base text-gray-300 mx-auto block text-center"></i>;
            }
            return <span className="text-gray-700 text-xs font-semibold px-2 py-1 bg-gray-100 rounded break-words block text-center leading-tight">{val}</span>;
        };

        const SmartListOrMatrix = ({ text, titleCol, defaultText = "Não cadastrado", hasEvidence = false }) => {
            if (!text) return <p className="text-gray-500 italic text-sm">{defaultText}</p>;
            const lines = text.split('\n').filter(l => l.trim() !== '');
            const isMatrix = lines.some(l => l.includes('|'));

            if (!isMatrix) {
                return (
                    <ul className="list-disc pl-5 space-y-2 text-gray-600 text-sm marker:text-blue-400">
                        {lines.map((item, i) => <li key={i} className="pl-1">{item}</li>)}
                    </ul>
                );
            }

            return (
                <div className="overflow-x-auto rounded-lg border border-gray-200 shadow-sm mt-2">
                    <table className="w-full text-sm text-left border-collapse min-w-[500px]">
                        <thead className="bg-gray-100/80 text-gray-700">
                            <tr>
                                <th className="p-3 border-b font-bold text-gray-700">{titleCol}</th>
                                <th className="p-3 border-b text-center w-20 font-extrabold text-blue-900 border-l border-gray-200">JR</th>
                                <th className="p-3 border-b text-center w-20 font-extrabold text-blue-900 border-l border-gray-200">PL</th>
                                <th className="p-3 border-b text-center w-20 font-extrabold text-blue-900 border-l border-gray-200">SR</th>
                                {hasEvidence && <th className="p-3 border-b font-bold text-gray-700 border-l border-gray-200 w-48">Evidência</th>}
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-100">
                            {lines.map((line, idx) => {
                                const parts = line.split('|').map(p => p.trim());
                                return (
                                    <tr key={idx} className="hover:bg-blue-50/30 transition-colors">
                                        <td className="p-3 text-gray-800 font-medium">{parts[0]}</td>
                                        <td className="p-2 text-center align-middle border-l border-gray-100">{renderMark(parts[1] || '')}</td>
                                        <td className="p-2 text-center align-middle border-l border-gray-100">{renderMark(parts[2] || '')}</td>
                                        <td className="p-2 text-center align-middle border-l border-gray-100">{renderMark(parts[3] || '')}</td>
                                        {hasEvidence && (
                                            <td className="p-3 text-gray-600 text-xs border-l border-gray-100">
                                                {parts[4] ? parts[4] : <i className="ph-bold ph-minus text-gray-300 block text-center"></i>}
                                            </td>
                                        )}
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                </div>
            );
        };

        const EditableMatrix = ({ text, onChange, titleCol, hasEvidence = false, evidenceOptions = [] }) => {
            const [rows, setRows] = useState([]);

            useEffect(() => {
                if (!text) { setRows([]); return; }
                const lines = text.split('\n').filter(l => l.trim() !== '');
                const parsed = lines.map(line => {
                    const p = line.split('|').map(x => x.trim());
                    return { item: p[0]||'', jr: p[1]||'', pl: p[2]||'', sr: p[3]||'', ev: p[4]||'' };
                });
                setRows(parsed);
            }, [text]);

            const notifyChange = (newRows) => {
                const str = newRows.map(r => `${r.item} | ${r.jr} | ${r.pl} | ${r.sr} ${hasEvidence ? '| '+r.ev : ''}`).join('\n');
                onChange(str);
            };

            const updateRow = (idx, field, val) => {
                const nr = [...rows];
                nr[idx][field] = val;
                setRows(nr);
                notifyChange(nr);
            };

            const addRow = () => {
                const nr = [...rows, { item: '', jr: '', pl: '', sr: '', ev: '' }];
                setRows(nr);
                notifyChange(nr);
            };

            const removeRow = (idx) => {
                const nr = rows.filter((_, i) => i !== idx);
                setRows(nr);
                notifyChange(nr);
            };

            const isChecked = (val) => {
                const v = val.toLowerCase().trim();
                return v === 'x' || v === 'v' || v === 'sim';
            };

            const handleCheck = (idx, field, currentVal) => {
                updateRow(idx, field, isChecked(currentVal) ? '' : 'X');
            };

            return (
                <div className="overflow-x-auto rounded-lg border border-blue-200 shadow-sm mt-2">
                    <table className="w-full text-sm text-left border-collapse min-w-[500px] bg-blue-50/20">
                        <thead className="bg-blue-100/50 text-blue-900">
                            <tr>
                                <th className="p-3 border-b font-bold">{titleCol}</th>
                                <th className="p-3 border-b text-center w-16 border-l border-blue-200">JR</th>
                                <th className="p-3 border-b text-center w-16 border-l border-blue-200">PL</th>
                                <th className="p-3 border-b text-center w-16 border-l border-blue-200">SR</th>
                                {hasEvidence && <th className="p-3 border-b font-bold border-l border-blue-200 w-48">Evidência</th>}
                                <th className="p-3 border-b text-center w-12 border-l border-blue-200">Ação</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-blue-100">
                            {rows.map((r, idx) => (
                                <tr key={idx}>
                                    <td className="p-2"><input type="text" value={r.item} onChange={(e) => updateRow(idx, 'item', e.target.value)} className="w-full p-2 border border-blue-300 rounded bg-white focus:ring-1 focus:ring-blue-500 text-sm" placeholder="Descreva o item..." /></td>
                                    <td className="p-2 text-center border-l border-blue-100"><input type="checkbox" checked={isChecked(r.jr)} onChange={() => handleCheck(idx, 'jr', r.jr)} className="w-5 h-5 text-blue-600 rounded cursor-pointer" /></td>
                                    <td className="p-2 text-center border-l border-blue-100"><input type="checkbox" checked={isChecked(r.pl)} onChange={() => handleCheck(idx, 'pl', r.pl)} className="w-5 h-5 text-blue-600 rounded cursor-pointer" /></td>
                                    <td className="p-2 text-center border-l border-blue-100"><input type="checkbox" checked={isChecked(r.sr)} onChange={() => handleCheck(idx, 'sr', r.sr)} className="w-5 h-5 text-blue-600 rounded cursor-pointer" /></td>
                                    {hasEvidence && (
                                        <td className="p-2 border-l border-blue-100">
                                            <MultiSelectDropdown options={evidenceOptions} selectedValues={r.ev} onChange={(val) => updateRow(idx, 'ev', val)} />
                                        </td>
                                    )}
                                    <td className="p-2 text-center border-l border-blue-100"><button onClick={() => removeRow(idx)} className="text-red-500 hover:bg-red-100 p-1.5 rounded"><i className="ph-bold ph-trash text-lg"></i></button></td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                    <div className="p-2 bg-blue-50/50 border-t border-blue-200 flex justify-center">
                        <button onClick={addRow} className="text-blue-700 font-semibold text-sm hover:bg-blue-100 px-4 py-1.5 rounded-full flex items-center gap-1"><i className="ph-bold ph-plus"></i> Adicionar Linha</button>
                    </div>
                </div>
            );
        };

        const EditableFixedMatrix = ({ text, onChange, titleCol }) => {
            const [rows, setRows] = useState([]);

            useEffect(() => {
                if (!text) { setRows([]); return; }
                const lines = text.split('\n').filter(l => l.trim() !== '');
                setRows(lines.map(line => {
                    const p = line.split('|').map(x => x.trim());
                    return { item: p[0]||'', jr: p[1]||'', pl: p[2]||'', sr: p[3]||'' };
                }));
            }, [text]);

            const notifyChange = (newRows) => {
                onChange(newRows.map(r => `${r.item} | ${r.jr} | ${r.pl} | ${r.sr}`).join('\n'));
            };

            const updateRow = (idx, field, val) => {
                const nr = [...rows];
                nr[idx][field] = val;
                setRows(nr);
                notifyChange(nr);
            };

            return (
                <div className="overflow-x-auto rounded-lg border border-blue-200 shadow-sm mt-2">
                    <table className="w-full text-sm text-left border-collapse min-w-[500px] bg-blue-50/20">
                        <thead className="bg-blue-100/50 text-blue-900">
                            <tr>
                                <th className="p-3 border-b font-bold">{titleCol}</th>
                                <th className="p-3 border-b text-center w-32 border-l border-blue-200">JR</th>
                                <th className="p-3 border-b text-center w-32 border-l border-blue-200">PL</th>
                                <th className="p-3 border-b text-center w-32 border-l border-blue-200">SR</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-blue-100">
                            {rows.map((r, idx) => (
                                <tr key={idx}>
                                    <td className="p-3 font-semibold text-blue-900 bg-blue-50/50">{r.item}</td>
                                    <td className="p-2 border-l border-blue-100"><input type="text" value={r.jr} onChange={(e) => updateRow(idx, 'jr', e.target.value)} className="w-full p-2 border border-blue-300 rounded focus:ring-1 focus:ring-blue-500 text-xs text-center" /></td>
                                    <td className="p-2 border-l border-blue-100"><input type="text" value={r.pl} onChange={(e) => updateRow(idx, 'pl', e.target.value)} className="w-full p-2 border border-blue-300 rounded focus:ring-1 focus:ring-blue-500 text-xs text-center" /></td>
                                    <td className="p-2 border-l border-blue-100"><input type="text" value={r.sr} onChange={(e) => updateRow(idx, 'sr', e.target.value)} className="w-full p-2 border border-blue-300 rounded focus:ring-1 focus:ring-blue-500 text-xs text-center" /></td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        };


        function PortalApp() {
            const [cargos, setCargos] = useState([]);
            const [usuarios, setUsuarios] = useState([]);
            const [cargoSelecionado, setCargoSelecionado] = useState(null);
            
            const [loading, setLoading] = useState(true);
            const [erro, setErro] = useState(null);
            const [toast, setToast] = useState(null);
            
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [pastasAbertas, setPastasAbertas] = useState({});
            const [termoBusca, setTermoBusca] = useState('');

            const [isAuth, setIsAuth] = useState(false);
            const [loginEmail, setLoginEmail] = useState('');
            const [loginSenha, setLoginSenha] = useState('');

            const [isEditing, setIsEditing] = useState(false);
            const [editedCargo, setEditedCargo] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);

            const showToast = (msg, type = 'info') => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 4000);
            };

            const buscarDadosGlobais = async () => {
                setLoading(true);
                setErro(null);
                try {
                    const [csvUsuarios, csvCargos] = await Promise.all([
                        fetchWithTimeout(getUsuariosUrl(), 15000),
                        fetchWithTimeout(getCargosUrl(), 15000)
                    ]);

                    const parsedUsers = parseCSV(csvUsuarios);
                    const usersMap = parsedUsers.map(u => ({
                        nome: u[0] || '',
                        email: (u[1] || '').trim().toLowerCase(),
                        senha: (u[3] || '').trim(),
                        diretoria: u[4] || '',
                        departamento: u[5] || ''
                    })).filter(u => u.email);
                    setUsuarios(usersMap);

                    const parsedCargos = parseCSV(csvCargos);
                    const cargosMap = {};
                    
                    parsedCargos.forEach((val, index) => {
                        const titulo = val[2] || '';
                        if (!titulo) return;
                        const chave = `${val[0]}|${val[1]}|${titulo}`;

                        if (!cargosMap[chave]) {
                            cargosMap[chave] = {
                                id: index, area: val[0] || 'Geral', departamento: val[1] || 'Geral',
                                titulo: titulo, cbo: val[3] || '', codigo: val[4] || '',
                                hierarquia: val[5] || '', missao: val[6] || '',
                                escopo: '', compTecnicas: '', compComportamentais: '', experiencia: '', formacao: ''
                            };
                        } else {
                            if (val[0] && cargosMap[chave].area === 'Geral') cargosMap[chave].area = val[0];
                            if (val[1] && cargosMap[chave].departamento === 'Geral') cargosMap[chave].departamento = val[1];
                            if (val[3] && !cargosMap[chave].cbo) cargosMap[chave].cbo = val[3];
                            if (val[4] && !cargosMap[chave].codigo) cargosMap[chave].codigo = val[4];
                            if (val[5] && !cargosMap[chave].hierarquia) cargosMap[chave].hierarquia = val[5];
                            if (val[6] && !cargosMap[chave].missao) cargosMap[chave].missao = val[6];
                        }

                        const categoria = (val[7] || '').toLowerCase().trim();
                        const item = (val[8] || '').trim();
                        if (categoria && item) {
                            const linha = `${item} | ${val[9]||''} | ${val[10]||''} | ${val[11]||''} | ${val[12]||''}\n`;
                            if (categoria.includes('escopo') || categoria.includes('responsabilidade')) cargosMap[chave].escopo += linha;
                            else if (categoria.includes('técnica') || categoria.includes('tecnica')) cargosMap[chave].compTecnicas += linha;
                            else if (categoria.includes('comportamental') || categoria.includes('comportamento')) cargosMap[chave].compComportamentais += linha;
                            else if (categoria.includes('experiência') || categoria.includes('experiencia')) cargosMap[chave].experiencia += linha;
                            else if (categoria.includes('formação') || categoria.includes('formacao')) cargosMap[chave].formacao += linha;
                            else cargosMap[chave].escopo += linha;
                        }
                    });

                    const arrCargos = Object.values(cargosMap).sort((a, b) => a.titulo.localeCompare(b.titulo));
                    setCargos(arrCargos);

                    if (cargoSelecionado) {
                        const chaveSelect = `${cargoSelecionado.area}|${cargoSelecionado.departamento}|${cargoSelecionado.titulo}`;
                        const atualizado = arrCargos.find(c => `${c.area}|${c.departamento}|${c.titulo}` === chaveSelect);
                        if (atualizado) setCargoSelecionado(atualizado);
                    }
                } catch (error) {
                    setErro(error.message);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => { buscarDadosGlobais(); }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                const u = usuarios.find(user => user.email === loginEmail.toLowerCase().trim() && user.senha === loginSenha.trim());
                if (u) {
                    setIsAuth(u);
                    setLoginEmail(''); setLoginSenha('');
                    setPastasAbertas({ [u.diretoria]: true, [`${u.diretoria}|${u.departamento}`]: true });
                    showToast("Login realizado com sucesso!", "success");
                } else {
                    showToast("E-mail ou senha incorretos.", "error");
                }
            };

            const togglePasta = (idDaPasta) => setPastasAbertas(p => ({ ...p, [idDaPasta]: !p[idDaPasta] }));

            const cargosFiltradosGestor = cargos.filter(c => isAuth && c.area === isAuth.diretoria && c.departamento === isAuth.departamento);
            
            const arvoreDeCargos = {};
            cargosFiltradosGestor.forEach(cargo => {
                if (!arvoreDeCargos[cargo.area]) arvoreDeCargos[cargo.area] = {};
                if (!arvoreDeCargos[cargo.area][cargo.departamento]) arvoreDeCargos[cargo.area][cargo.departamento] = [];
                arvoreDeCargos[cargo.area][cargo.departamento].push(cargo);
            });

            const cargosFiltradosBusca = termoBusca ? cargosFiltradosGestor.filter(c => 
                c.titulo.toLowerCase().includes(termoBusca.toLowerCase())
            ) : [];

            const ativarEdicao = () => {
                setEditedCargo(JSON.parse(JSON.stringify(cargoSelecionado)));
                setIsEditing(true);
            };

            const cancelarEdicao = () => {
                setIsEditing(false);
                setEditedCargo(null);
            };

            const parseToObjList = (txt) => {
                if (!txt) return [];
                return txt.split('\n').filter(l => l.trim()).map(line => {
                    const p = line.split('|').map(s => s.trim());
                    return { item: p[0]||'', jr: p[1]||'', pl: p[2]||'', sr: p[3]||'', ev: p[4]||'' };
                });
            };

            const extrairLinhasParaPlanilha = (orig, novo, categoria) => {
                const lsOrig = parseToObjList(orig);
                const lsNovo = parseToObjList(novo);
                const result = [];
                const max = Math.max(lsOrig.length, lsNovo.length);
                for (let i=0; i<max; i++) {
                    const o = lsOrig[i] || {item:'', jr:'', pl:'', sr:'', ev:''};
                    const n = lsNovo[i] || {item:'', jr:'', pl:'', sr:'', ev:''};
                    if (!o.item && !n.item) continue;
                    result.push({
                        categoria: categoria,
                        descOrig: o.item, descNovo: n.item,
                        jrOrig: o.jr, jrNovo: n.jr,
                        plOrig: o.pl, plNovo: n.pl,
                        srOrig: o.sr, srNovo: n.sr,
                        evOrig: o.ev, evNovo: n.ev
                    });
                }
                return result;
            };

            const enviarRevisao = async () => {
                setIsSubmitting(true);
                const payload = {
                    gestor: isAuth,
                    cargoReferencia: {
                        titulo: cargoSelecionado.titulo, cbo: cargoSelecionado.cbo,
                        codigo: cargoSelecionado.codigo, hierarquia: cargoSelecionado.hierarquia,
                        missaoOrig: cargoSelecionado.missao, missaoNova: editedCargo.missao
                    },
                    linhas: [
                        ...extrairLinhasParaPlanilha(cargoSelecionado.escopo, editedCargo.escopo, 'Escopo'),
                        ...extrairLinhasParaPlanilha(cargoSelecionado.compTecnicas, editedCargo.compTecnicas, 'Técnica'),
                        ...extrairLinhasParaPlanilha(cargoSelecionado.compComportamentais, editedCargo.compComportamentais, 'Comportamental'),
                        ...extrairLinhasParaPlanilha(cargoSelecionado.experiencia, editedCargo.experiencia, 'Experiência'),
                        ...extrairLinhasParaPlanilha(cargoSelecionado.formacao, editedCargo.formacao, 'Formação')
                    ]
                };

                try {
                    const res = await fetch(APPS_SCRIPT_WEBHOOK, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify(payload)
                    });
                    showToast("Proposta enviada com sucesso para o RH!", "success");
                    cancelarEdicao();
                } catch (e) {
                    showToast("Erro ao enviar revisão. Verifique sua conexão.", "error");
                } finally {
                    setIsSubmitting(false);
                }
            };


            return (
                <div className="min-h-screen bg-gray-100 flex flex-col font-sans relative">
                    
                    {toast && (
                        <div className={`fixed top-5 left-1/2 transform -translate-x-1/2 z-[100] px-6 py-3 rounded-xl shadow-2xl text-white font-bold flex items-center gap-3 toast-animate ${toast.type === 'error' ? 'bg-red-600' : 'bg-emerald-600'}`}>
                            <i className={`ph-fill ${toast.type === 'error' ? 'ph-warning-circle' : 'ph-check-circle'} text-2xl`}></i>
                            {toast.msg}
                        </div>
                    )}

                    <div className={`fixed inset-0 bg-black/50 z-40 md:hidden transition-opacity ${isSidebarOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`} onClick={() => setIsSidebarOpen(false)}></div>

                    <div className={`fixed top-0 left-0 h-full w-80 bg-white shadow-2xl z-50 transform transition-transform duration-300 flex flex-col ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="bg-blue-900 p-5 flex justify-between items-center text-white">
                            <h2 className="font-bold text-lg flex items-center gap-2"><i className="ph-bold ph-list"></i> Menu de Cargos</h2>
                            <button onClick={() => setIsSidebarOpen(false)} className="hover:text-blue-300"><i className="ph-bold ph-x text-xl"></i></button>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-4 bg-gray-50">
                            {!isAuth ? (
                                <form onSubmit={handleLogin} className="space-y-4 bg-white p-5 rounded-xl border border-gray-200 shadow-sm mt-4">
                                    <div className="text-center mb-6">
                                        <div className="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3 text-blue-600">
                                            <i className="ph-fill ph-lock-key text-3xl"></i>
                                        </div>
                                        <h3 className="font-bold text-gray-800">Acesso Restrito</h3>
                                        <p className="text-xs text-gray-500 mt-1">Faça login com seu e-mail corporativo para acessar os descritivos da sua área.</p>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-700 mb-1">E-mail</label>
                                        <input type="email" value={loginEmail} onChange={e=>setLoginEmail(e.target.value)} className="w-full border border-gray-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="seuemail@cury.net" required/>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-700 mb-1">Senha</label>
                                        <input type="password" value={loginSenha} onChange={e=>setLoginSenha(e.target.value)} className="w-full border border-gray-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="••••••••" required/>
                                    </div>
                                    <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition-colors mt-2 text-sm shadow-md">Entrar no Sistema</button>
                                </form>
                            ) : (
                                <div>
                                    <div className="mb-4 bg-blue-50 p-3 rounded-lg border border-blue-100 flex items-center gap-3">
                                        <div className="bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center font-bold text-lg">{isAuth.nome.charAt(0)}</div>
                                        <div className="flex-1 overflow-hidden">
                                            <p className="font-bold text-sm text-blue-900 truncate">{isAuth.nome}</p>
                                            <p className="text-xs text-blue-600 truncate">{isAuth.departamento}</p>
                                        </div>
                                        <button onClick={() => { setIsAuth(false); setCargoSelecionado(null); }} className="text-gray-400 hover:text-red-500"><i className="ph-bold ph-sign-out text-lg"></i></button>
                                    </div>

                                    <div className="relative mb-4">
                                        <i className="ph-bold ph-magnifying-glass absolute left-3 top-2.5 text-gray-400"></i>
                                        <input type="text" placeholder="Buscar cargo..." value={termoBusca} onChange={e=>setTermoBusca(e.target.value)} className="w-full pl-9 pr-3 py-2 bg-white border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none" />
                                    </div>

                                    {termoBusca ? (
                                        <div className="space-y-1">
                                            {cargosFiltradosBusca.map(c => (
                                                <button key={c.id} onClick={() => { setCargoSelecionado(c); setIsSidebarOpen(false); if(isEditing) cancelarEdicao(); }} className={`w-full text-left px-3 py-2 rounded-lg transition-colors border-l-4 ${cargoSelecionado?.id === c.id ? 'bg-blue-100 border-blue-600' : 'bg-white border-transparent hover:bg-gray-100 shadow-sm'}`}>
                                                    <p className={`font-semibold text-sm ${cargoSelecionado?.id === c.id ? 'text-blue-900' : 'text-gray-800'}`}>{c.titulo}</p>
                                                </button>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="space-y-1">
                                            {Object.keys(arvoreDeCargos).map(area => (
                                                <div key={area} className="mb-1">
                                                    <button onClick={() => togglePasta(area)} className="w-full flex items-center gap-2 px-2 py-2 hover:bg-blue-100 rounded-lg text-left group">
                                                        <i className={`ph-fill ${pastasAbertas[area] ? 'ph-folder-open' : 'ph-folder'} text-blue-500 text-lg`}></i>
                                                        <span className="font-bold text-sm text-gray-800 flex-1 truncate">{area}</span>
                                                        <i className={`ph-bold ${pastasAbertas[area] ? 'ph-caret-down' : 'ph-caret-right'} text-gray-400`}></i>
                                                    </button>
                                                    {pastasAbertas[area] && (
                                                        <div className="ml-5 pl-2 border-l border-blue-200 mt-1 space-y-1">
                                                            {Object.keys(arvoreDeCargos[area]).map(dept => {
                                                                const idDept = `${area}|${dept}`;
                                                                return (
                                                                    <div key={idDept}>
                                                                        <button onClick={() => togglePasta(idDept)} className="w-full flex items-center gap-2 px-2 py-1.5 hover:bg-blue-100 rounded-lg text-left">
                                                                            <i className={`ph-fill ${pastasAbertas[idDept] ? 'ph-folder-open' : 'ph-folder'} text-blue-400`}></i>
                                                                            <span className="font-medium text-sm text-gray-700 flex-1 truncate">{dept}</span>
                                                                        </button>
                                                                        {pastasAbertas[idDept] && (
                                                                            <div className="ml-4 pl-2 border-l border-gray-200 mt-1 space-y-0.5 mb-2">
                                                                                {arvoreDeCargos[area][dept].map(c => (
                                                                                    <button key={c.id} onClick={() => { setCargoSelecionado(c); setIsSidebarOpen(false); if(isEditing) cancelarEdicao(); }} className={`w-full flex items-center gap-2 px-2 py-1.5 rounded-md text-left ${cargoSelecionado?.id === c.id ? 'bg-blue-600 text-white shadow' : 'text-gray-600 hover:bg-gray-200'}`}>
                                                                                        <i className="ph-fill ph-briefcase text-xs opacity-70"></i>
                                                                                        <span className="text-xs truncate">{c.titulo}</span>
                                                                                    </button>
                                                                                ))}
                                                                            </div>
                                                                        )}
                                                                    </div>
                                                                )
                                                            })}
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>

                    <header className="bg-blue-900 text-white shadow-md z-30 sticky top-0">
                        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <button onClick={() => setIsSidebarOpen(true)} className="p-2 bg-blue-800 hover:bg-blue-700 rounded-lg transition-colors border border-white/10 shadow-sm flex items-center gap-2">
                                    <i className="ph-bold ph-list text-xl"></i>
                                    <span className="hidden sm:inline font-semibold text-sm">Menu</span>
                                </button>
                                <div className="h-8 w-px bg-white/20 mx-1 hidden sm:block"></div>
                                <div className="bg-white p-1.5 rounded flex items-center justify-center">
                                    <i className="ph-fill ph-buildings text-xl text-blue-900"></i>
                                </div>
                                <div>
                                    <h1 className="text-lg font-bold tracking-tight leading-tight">Cargos & Salários</h1>
                                    <p className="text-blue-200 text-[10px] uppercase font-bold tracking-wider">Estrutura Cury</p>
                                </div>
                            </div>
                            
                            <div className="flex gap-2">
                                {!isEditing ? (
                                    <button onClick={buscarDadosGlobais} className="px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-bold bg-blue-800 text-white hover:bg-blue-700 transition-colors shadow-sm">
                                        <i className={`ph-bold ph-arrows-clockwise text-base ${loading ? 'animate-spin' : ''}`}></i>
                                        <span className="hidden sm:inline">Atualizar Base</span>
                                    </button>
                                ) : (
                                    <div className="flex gap-2 animate-fade-in">
                                        <button onClick={cancelarEdicao} disabled={isSubmitting} className="px-4 py-2 rounded-lg text-sm font-bold bg-red-100 text-red-700 hover:bg-red-200 transition-colors border border-red-200">
                                            Cancelar
                                        </button>
                                        <button onClick={enviarRevisao} disabled={isSubmitting} className="px-4 py-2 rounded-lg text-sm font-bold bg-emerald-500 text-white hover:bg-emerald-600 transition-colors shadow-md flex items-center gap-2">
                                            {isSubmitting ? <i className="ph-bold ph-spinner animate-spin"></i> : <i className="ph-bold ph-paper-plane-tilt"></i>}
                                            <span className="hidden sm:inline">{isSubmitting ? 'Enviando...' : 'Enviar para RH'}</span>
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 w-full max-w-5xl mx-auto p-4 md:p-8 flex flex-col h-full">
                        {loading && cargos.length === 0 ? (
                            <div className="flex-1 flex flex-col items-center justify-center">
                                <i className="ph-bold ph-spinner text-5xl text-blue-600 animate-spin mb-4"></i>
                                <h2 className="text-xl font-semibold text-gray-700">Conectando aos Servidores...</h2>
                            </div>
                        ) : erro ? (
                            <div className="flex-1 flex flex-col items-center justify-center p-8 text-center">
                                <div className="bg-red-50 p-6 rounded-2xl max-w-lg border border-red-100">
                                    <i className="ph-fill ph-warning-circle text-5xl text-red-500 mx-auto mb-4"></i>
                                    <h2 className="text-xl font-bold text-gray-800 mb-2">Erro de Conexão</h2>
                                    <p className="text-gray-600 text-sm">{erro}</p>
                                </div>
                            </div>
                        ) : !isAuth ? (
                            <div className="flex flex-col items-center justify-center h-full text-center flex-1">
                                <div className="bg-white p-8 rounded-full mb-6 shadow-sm border border-gray-200 relative">
                                    <i className="ph-fill ph-shield-check text-6xl text-blue-600 relative z-10"></i>
                                    <div className="absolute inset-0 bg-blue-100 rounded-full animate-ping opacity-20"></div>
                                </div>
                                <h3 className="text-3xl font-black text-gray-800 mb-3 tracking-tight">Acesso de Gestor</h3>
                                <p className="text-gray-500 max-w-md text-base leading-relaxed">
                                    Abra o Menu Lateral (canto superior esquerdo) e faça login com seu e-mail corporativo para visualizar os descritivos técnicos de sua equipe.
                                </p>
                                <button onClick={() => setIsSidebarOpen(true)} className="mt-8 bg-blue-900 text-white font-bold py-3 px-8 rounded-full shadow-lg hover:bg-blue-800 transition transform hover:scale-105">
                                    Abrir Menu de Login
                                </button>
                            </div>
                        ) : cargoSelecionado ? (
                            <div className="bg-white rounded-2xl shadow-xl border border-gray-200 overflow-hidden flex flex-col relative pb-8">
                                
                                {isEditing && (
                                    <div className="bg-emerald-500 text-white text-center py-1.5 text-xs font-bold tracking-widest uppercase flex items-center justify-center gap-2">
                                        <i className="ph-bold ph-pencil-simple"></i> Modo de Edição Ativo
                                    </div>
                                )}

                                <div className={`p-6 md:p-10 border-b border-gray-200 relative overflow-hidden flex flex-col justify-end ${isEditing ? 'bg-emerald-900' : 'bg-blue-900'} text-white transition-colors duration-500 min-h-[200px]`}>
                                    <div className="absolute top-0 right-0 opacity-[0.05] pointer-events-none transform translate-x-1/4 -translate-y-1/4">
                                        <i className="ph-fill ph-buildings text-[300px]"></i>
                                    </div>
                                    <div className="relative z-10 w-full flex flex-col md:flex-row md:items-end justify-between gap-4">
                                        <div className="flex-1">
                                            <div className="flex flex-wrap items-center gap-2 text-xs font-bold text-blue-200 mb-4 uppercase tracking-wider bg-black/20 w-max px-3 py-1.5 rounded-full backdrop-blur-sm">
                                                <span>{cargoSelecionado.area}</span>
                                                <i className="ph-bold ph-caret-right text-[10px]"></i>
                                                <span className="text-white">{cargoSelecionado.departamento}</span>
                                            </div>
                                            <h2 className="text-3xl md:text-4xl font-black mb-3 leading-tight tracking-tight">{cargoSelecionado.titulo}</h2>
                                            
                                            <div className="flex flex-wrap gap-3">
                                                {cargoSelecionado.cbo && <span className="bg-black/30 border border-white/20 px-3 py-1.5 rounded-md text-xs font-bold flex items-center gap-1"><span className="opacity-70">CBO:</span> {cargoSelecionado.cbo}</span>}
                                                {cargoSelecionado.codigo && <span className="bg-black/30 border border-white/20 px-3 py-1.5 rounded-md text-xs font-bold flex items-center gap-1"><span className="opacity-70">CÓD:</span> {cargoSelecionado.codigo}</span>}
                                            </div>
                                        </div>
                                        {!isEditing && (
                                            <button onClick={ativarEdicao} className="relative z-10 bg-white text-blue-900 hover:bg-blue-50 px-5 py-3 rounded-xl text-sm font-bold flex items-center justify-center gap-2 shadow-lg transition-transform transform hover:-translate-y-1">
                                                <i className="ph-bold ph-pencil-simple-line text-lg"></i> Solicitar Revisão
                                            </button>
                                        )}
                                    </div>
                                </div>
                                
                                <div className="p-6 md:p-10 space-y-10">
                                    <section>
                                        <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                                            <i className="ph-fill ph-tree-structure text-lg"></i> Estrutura Hierárquica
                                        </h3>
                                        <p className="text-blue-900 font-bold bg-blue-50 px-4 py-3 rounded-lg border border-blue-100 text-sm">
                                            {cargoSelecionado.hierarquia || "Estrutura não detalhada."}
                                        </p>
                                    </section>

                                    <section>
                                        <h3 className="text-lg font-black text-gray-800 border-b-2 border-gray-100 pb-2 mb-4 flex items-center gap-2">
                                            <i className="ph-fill ph-target text-red-500 text-2xl"></i> Missão do Cargo
                                        </h3>
                                        {isEditing ? (
                                            <textarea value={editedCargo.missao} onChange={(e) => setEditedCargo({...editedCargo, missao: e.target.value})} className="w-full border-2 border-emerald-300 rounded-lg p-4 focus:ring-4 focus:ring-emerald-100 outline-none text-gray-800 font-medium bg-emerald-50/30" rows={3} />
                                        ) : (
                                            <p className="text-gray-700 leading-relaxed font-medium bg-gray-50 p-5 rounded-xl border border-gray-100">
                                                {cargoSelecionado.missao || "Missão não cadastrada."}
                                            </p>
                                        )}
                                    </section>

                                    <section>
                                        <h3 className="text-lg font-black text-gray-800 border-b-2 border-gray-100 pb-2 mb-4 flex items-center gap-2">
                                            <i className="ph-fill ph-list-checks text-blue-600 text-2xl"></i> Escopo / Responsabilidades
                                        </h3>
                                        {isEditing ? (
                                            <EditableMatrix text={editedCargo.escopo} titleCol="Responsabilidade" onChange={(val) => setEditedCargo({...editedCargo, escopo: val})} />
                                        ) : (
                                            <SmartListOrMatrix text={cargoSelecionado.escopo} titleCol="Atividade / Responsabilidade" />
                                        )}
                                    </section>

                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                                        <section>
                                            <h3 className="text-lg font-black text-gray-800 border-b-2 border-gray-100 pb-2 mb-4 flex items-center gap-2">
                                                <i className="ph-fill ph-wrench text-gray-600 text-2xl"></i> Técnicas
                                            </h3>
                                            {isEditing ? (
                                                <EditableMatrix text={editedCargo.compTecnicas} titleCol="Item" hasEvidence={true} evidenceOptions={['Certificado', 'Experiência', 'Teste', 'Entrevista']} onChange={(val) => setEditedCargo({...editedCargo, compTecnicas: val})} />
                                            ) : (
                                                <SmartListOrMatrix text={cargoSelecionado.compTecnicas} titleCol="Item" hasEvidence={true} />
                                            )}
                                        </section>

                                        <section>
                                            <h3 className="text-lg font-black text-gray-800 border-b-2 border-gray-100 pb-2 mb-4 flex items-center gap-2">
                                                <i className="ph-fill ph-users text-emerald-600 text-2xl"></i> Comportamentais
                                            </h3>
                                            {isEditing ? (
                                                <EditableMatrix text={editedCargo.compComportamentais} titleCol="Comportamento" hasEvidence={true} evidenceOptions={['Experiência', 'Teste Comportamental', 'Entrevista']} onChange={(val) => setEditedCargo({...editedCargo, compComportamentais: val})} />
                                            ) : (
                                                <SmartListOrMatrix text={cargoSelecionado.compComportamentais} titleCol="Comportamento" hasEvidence={true} />
                                            )}
                                        </section>
                                    </div>

                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-10 pt-4">
                                        <section>
                                            <h3 className="text-lg font-black text-gray-800 border-b-2 border-gray-100 pb-2 mb-4 flex items-center gap-2">
                                                <i className="ph-fill ph-graduation-cap text-purple-600 text-2xl"></i> Formação Acadêmica
                                            </h3>
                                            {isEditing ? (
                                                <EditableFixedMatrix text={editedCargo.formacao} titleCol="Exigência" onChange={(val) => setEditedCargo({...editedCargo, formacao: val})} />
                                            ) : (
                                                <SmartListOrMatrix text={cargoSelecionado.formacao} titleCol="Exigência" />
                                            )}
                                        </section>

                                        <section>
                                            <h3 className="text-lg font-black text-gray-800 border-b-2 border-gray-100 pb-2 mb-4 flex items-center gap-2">
                                                <i className="ph-fill ph-briefcase text-amber-600 text-2xl"></i> Experiência Profissional
                                            </h3>
                                            {isEditing ? (
                                                <EditableFixedMatrix text={editedCargo.experiencia} titleCol="Critério" onChange={(val) => setEditedCargo({...editedCargo, experiencia: val})} />
                                            ) : (
                                                <SmartListOrMatrix text={cargoSelecionado.experiencia} titleCol="Critério" />
                                            )}
                                        </section>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="flex flex-col items-center justify-center h-full text-center flex-1">
                                <div className="bg-white p-8 rounded-full mb-6 shadow-sm border border-gray-200">
                                    <i className="ph-fill ph-map-trifold text-6xl text-blue-300"></i>
                                </div>
                                <h3 className="text-3xl font-black text-gray-800 mb-3 tracking-tight">Trilhas de Carreira</h3>
                                <p className="text-gray-500 max-w-md text-base leading-relaxed">
                                    Selecione um cargo no menu lateral para visualizar a matriz completa de responsabilidades para Junior, Pleno e Sênior em um só lugar.
                                </p>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PortalApp />);
    </script>
</body>
</html>
